<!doctype html>
<html lang="es">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Corpopitar - Bienvenido</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #1c285e 0%, #3b1111 100%);
        color: white;
      }
      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;

      h1 {
        font-size: 2.5rem;

      }
      p {
        font-size: 1.2rem;
        opacity: 0.9;
      }
      .status {
        background: #4caf50;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.9rem;
        display: inline-block;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 API Corpopitar</h1>
      <p>Tu API está funcionando correctamente</p>
